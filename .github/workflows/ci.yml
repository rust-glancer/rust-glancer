name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lints:
    name: lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/cargo-cache
        with:
          scope: ci-${{ github.job }}
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/cargo-cache
        with:
          scope: ci-${{ github.job }}
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest@0.9.132
      - name: Run tests
        run: cargo nextest run --workspace

  test-targets:
    name: test-targets
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target/test-targets
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/cargo-cache
        with:
          scope: ci-${{ github.job }}
          target-dir: target/test-targets
          dependency-key: ${{ hashFiles('rust-toolchain.toml', 'test_targets/**/Cargo.lock', 'test_targets/**/Cargo.toml') }}
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: just@1.48.1
      - name: Check test targets
        run: just check-test-targets

  client:
    name: client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/code
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: editors/code/package-lock.json
      - name: Install client dependencies
        run: npm ci
      - name: Check client formatting
        run: npm run fmt:check
      - name: Lint client
        run: npm run lint
      - name: Check client
        run: npm run check
      - name: Check client tests
        run: npm run check:test
      - name: Check client unit tests
        run: npm run check:unit
      - name: Run client smoke test
        run: xvfb-run -a npm run test

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-deny@0.19.4
      - name: Run cargo deny
        run: cargo deny check

  pr-checks:
    name: pr-checks
    runs-on: ubuntu-latest
    needs:
      - lints
      - tests
      - test-targets
      - client
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
