name: Performance

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - ".github/scripts/render_benchmark_comment.py"
      - ".github/scripts/render_lsp_compatibility_comment.py"
      - ".github/scripts/render_memory_profile_comment.py"
      - ".github/scripts/render_performance_comment.py"
      - ".github/workflows/performance.yml"
      - "test_targets/bench_fixtures/fetch-rust-analyzer.sh"
      - "test_targets/moderate_workspace/**"
  push:
    branches:
      - main
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - ".github/scripts/render_benchmark_comment.py"
      - ".github/scripts/render_lsp_compatibility_comment.py"
      - ".github/scripts/render_memory_profile_comment.py"
      - ".github/scripts/render_performance_comment.py"
      - ".github/workflows/performance.yml"
      - "test_targets/bench_fixtures/fetch-rust-analyzer.sh"
      - "test_targets/moderate_workspace/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  memory-profile:
    name: memory-profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/cargo-cache
        with:
          scope: performance-${{ github.job }}
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Restore base memory profile
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .ci/memory/base
          key: memory-profile-${{ github.event.pull_request.base.sha }}

      - name: Fetch rust-analyzer fixture
        run: ./test_targets/bench_fixtures/fetch-rust-analyzer.sh

      - name: Build rust-glancer
        run: cargo build --release --locked -p rust-glancer

      - name: Run memory profile
        run: |
          mkdir -p .ci/memory/current
          target/release/rust-glancer analyze test_targets/bench_fixtures/rust-analyzer \
            --memory \
            --package-residency all-offloadable \
            --format json > .ci/memory/current/result.json

      - name: Render memory profile section
        run: |
          python3 .github/scripts/render_memory_profile_comment.py \
            --current .ci/memory/current/result.json \
            --base .ci/memory/base/result.json \
            --output .ci/memory/comment.md \
            --section-title "Memory usage analysis"
          cat .ci/memory/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload memory profile section
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: memory-profile-comment
          path: .ci/memory/comment.md

      - name: Prepare main-branch memory profile cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .ci/memory/base
          cp .ci/memory/current/result.json .ci/memory/base/result.json

      - name: Save main-branch memory profile cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: .ci/memory/base
          key: memory-profile-${{ github.sha }}

  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/cargo-cache
        with:
          scope: performance-${{ github.job }}
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}
          exclude-paths: |
            !target/gungraun
            !target/gungraun/**

      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1
        with:
          packages: valgrind
          version: valgrind-cache-v1

      - name: Install Gungraun runner
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: gungraun-runner@0.18.2
          fallback: none

      - name: Restore base Gungraun baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: target/gungraun
          key: gungraun-${{ github.event.pull_request.base.sha }}

      - name: Run pull request benchmark
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .ci/benchmark/current
          cargo bench --locked -p rust-glancer --bench ci_analyze -- \
            --baseline=main \
            --save-summary=json \
            --output-format=json > .ci/benchmark/current/gungraun.jsonl

      - name: Run main-branch benchmark
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .ci/benchmark/current
          cargo bench --locked -p rust-glancer --bench ci_analyze -- \
            --save-baseline=main \
            --save-summary=json \
            --output-format=json > .ci/benchmark/current/gungraun.jsonl

      - name: Run ad-hoc benchmark
        if: github.event_name != 'pull_request' && !(github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          mkdir -p .ci/benchmark/current
          cargo bench --locked -p rust-glancer --bench ci_analyze -- \
            --save-summary=json \
            --output-format=json > .ci/benchmark/current/gungraun.jsonl

      - name: Render benchmark section
        run: |
          python3 .github/scripts/render_benchmark_comment.py \
            --input .ci/benchmark/current/gungraun.jsonl \
            --output .ci/benchmark/comment.md \
            --section-title "Benchmark results"
          cat .ci/benchmark/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark section
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-comment
          path: .ci/benchmark/comment.md

      - name: Save main-branch Gungraun baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: target/gungraun
          key: gungraun-${{ github.sha }}

  lsp-compatibility:
    name: lsp-compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/cargo-cache
        with:
          scope: performance-${{ github.job }}
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Restore base LSP compatibility
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .ci/lsp/base
          key: lsp-compatibility-${{ github.event.pull_request.base.sha }}

      - name: Fetch rust-analyzer fixture
        run: ./test_targets/bench_fixtures/fetch-rust-analyzer.sh

      - name: Install rust-analyzer server
        run: rustup component add rust-analyzer

      - name: Build rust-glancer
        run: cargo build --release --locked -p rust-glancer

      - name: Run LSP compatibility
        run: |
          mkdir -p .ci/lsp/current
          RUST_GLANCER_COMPARE_LSP_RUST_ANALYZER="$(rustup which rust-analyzer)" \
            target/release/rust-glancer compare-lsp rust_analyzer \
              --path test_targets/bench_fixtures/rust-analyzer \
              --format json > .ci/lsp/current/result.json

      - name: Render LSP compatibility section
        run: |
          python3 .github/scripts/render_lsp_compatibility_comment.py \
            --current .ci/lsp/current/result.json \
            --base .ci/lsp/base/result.json \
            --output .ci/lsp/comment.md \
            --section-title "LSP compatibility"
          cat .ci/lsp/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LSP compatibility section
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lsp-compatibility-comment
          path: .ci/lsp/comment.md

      - name: Prepare main-branch LSP compatibility cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .ci/lsp/base
          cp .ci/lsp/current/result.json .ci/lsp/base/result.json

      - name: Save main-branch LSP compatibility cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: .ci/lsp/base
          key: lsp-compatibility-${{ github.sha }}

  performance-comment:
    name: performance-comment
    if: github.event_name == 'pull_request'
    needs:
      - memory-profile
      - benchmark
      - lsp-compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download memory profile section
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: memory-profile-comment
          path: .ci/performance/memory

      - name: Download benchmark section
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: benchmark-comment
          path: .ci/performance/benchmark

      - name: Download LSP compatibility section
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lsp-compatibility-comment
          path: .ci/performance/lsp

      - name: Render performance comment
        run: |
          python3 .github/scripts/render_performance_comment.py \
            --memory .ci/performance/memory/comment.md \
            --benchmark .ci/performance/benchmark/comment.md \
            --lsp .ci/performance/lsp/comment.md \
            --output .ci/performance/comment.md
          cat .ci/performance/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: rust-glancer-performance
          path: .ci/performance/comment.md
