name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    env:
      RUST_GLANCER_BENCH_TARGETS: small_app

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-codspeed@4.6.0

      - name: Build benchmark targets
        run: cargo codspeed build -p rg_project --bench analysis_pipeline

      - name: Run benchmarks
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rg_project --bench analysis_pipeline
