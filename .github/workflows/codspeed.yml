name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    env:
      RUST_GLANCER_BENCH_TARGETS: small_app

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/cargo-cache
        with:
          scope: codspeed
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-codspeed@4.6.0

      - name: Build benchmark targets
        run: cargo codspeed build -p rg_project --bench analysis_pipeline

      - name: Run benchmarks
        uses: CodSpeedHQ/action@9d332c4d90b43981c3e55ae8e38e68709996240f # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rg_project --bench analysis_pipeline
