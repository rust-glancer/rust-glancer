name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    env:
      RUST_GLANCER_BENCH_TARGETS: small_app

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/cargo-cache
        with:
          scope: codspeed
          target-dir: target
          dependency-key: ${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@50b4a718b59c718df4ef27a3b445f86cd57b9f00 # v2.80.0
        with:
          tool: cargo-codspeed@4.6.0

      - name: Build benchmark targets
        run: cargo codspeed build -p rg_project --bench analysis_pipeline

      - name: Run benchmarks
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rg_project --bench analysis_pipeline
